<div class="form-container">

<div class="form-box">
<h2>Register</h2>
<form onsubmit="return validateRegister()">
<input type="text" id="rname" placeholder="Name"><br>
<input type="email" id="remail" placeholder="Email"><br>
<input type="password" id="rpassword" placeholder="Password"><br>
<input type="password" id="rconfirm" placeholder="Confirm Password"><br>
<button type="submit">Register</button>
</form>
</div>

<div class="form-box">
<h2>Login</h2>
<form onsubmit="return validateLogin()">
<input type="email" id="lemail" placeholder="Email"><br>
<input type="password" id="lpassword" placeholder="Password"><br>
<button type="submit">Login</button>
</form>
</div>

</div>
